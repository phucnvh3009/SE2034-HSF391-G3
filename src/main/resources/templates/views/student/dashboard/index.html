<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Khiển - Ký Túc Xá</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f3f4f6; }

        /* Layout Container */
        .container { display: flex; min-height: 100vh; }

        /* Sidebar Style */
        .sidebar {
            width: 260px;
            background: #1f2937;
            color: #fff;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .sidebar-logo {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 5px;
            padding-left: 10px;
        }
        .user-info {
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
            color: #38bdf8;
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }
        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #d1d5db;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar-menu a:hover {
            background: #374151;
            color: #fff;
        }
        .sidebar-menu a.active {
            background: #3b82f6;
            color: #fff;
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        h1 { margin-top: 0; margin-bottom: 4px; }
        .subtitle { color: #666; margin-top: 0; margin-bottom: 24px; }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .profile-title { font-size: 16px; color: #93c5fd; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; font-weight: bold; }
        .profile-name { font-size: 32px; font-weight: bold; margin-bottom: 16px; }
        .profile-info { font-size: 16px; color: #dbeafe; line-height: 1.8; }
        .profile-info p { margin: 8px 0; }
    </style>
</head>
<body>

<div class="container">
    <!-- Sidebar di chuyển -->
    <div class="sidebar">
        <div class="sidebar-logo">DORM Student</div>
        <div class="user-info">
            Xin chào, <strong th:text="${userDisplayName}">Sinh viên</strong>
        </div>
        <ul class="sidebar-menu">
            <li><a th:href="@{/student/dashboard}" class="active"> Dashboard</a></li>
            <li><a th:href="@{/notifications}">Thông báo</a></li>
            <li><a th:href="@{/student/reports}">Báo cáo sự cố</a></li>
            <li style="margin-top: auto; padding-top: 20px; border-top: 1px solid #374151;">
                <a th:href="@{/logout}" style="color: #f87171;"><span class="icon">🚪</span> Đăng xuất</a>
            </li>
        </ul>
    </div>

    <!-- Vùng nội dung chính -->
    <div class="content">
        <h1>Dashboard</h1>
        <p class="subtitle">Tổng quan thông tin cá nhân</p>

        <div class="dashboard-grid">
            <!-- Thẻ chào mừng sinh viên -->
            <div class="profile-card">
                <div class="profile-title">Chào mừng quay trở lại</div>
                <div class="profile-name" th:text="${'Xin chào, ' + userDisplayName + '!'}">Xin chào, Sinh viên!</div>
                <div class="profile-info">
                    <p><strong>Email tài khoản:</strong> <span th:text="${email}"></span></p>
                    <p><strong>Số điện thoại:</strong> <span th:text="${phone}"></span></p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
