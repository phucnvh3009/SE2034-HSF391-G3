<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{admin/layout :: layout('Quản lý Ban quản lý KTX', 'managers.css', ~{::content})}">
    <div th:fragment="content">
        <!-- Nút chuyển sang trang thêm mới -->
        <div style="margin-bottom: 20px; text-align: right;">
            <a th:href="@{/admin/managers/create}" class="btn btn-primary">Thêm Mới Quản Lý</a>
        </div>
        <!-- 2. Bảng Danh sách Dorm Managers -->
        <div class="card">
            <div class="card-title">Danh sách Quản lý tòa nhà</div>
            <div class="table-container">
                <table class="custom-table">
                    <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">STT</th>
                        <th>Họ và Tên</th>
                        <th>Gmail</th>
                        <th style="width: 150px; text-align: center;">Ngày tạo</th>
                        <th style="width: 120px; text-align: center;">Trạng thái</th>
                        <th style="width: 180px; text-align: center;">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Duyệt danh sách managers từ Model -->
                    <tr th:each="mgr, iterStat : ${managers}">
                        <td style="text-align: center;" th:text="${iterStat.count}">1</td>
                        <td>
                            <strong th:text="${mgr.fullName}">Nguyễn Văn A</strong>
                        </td>
                        <td th:text="${mgr.email}">managera@fpt.edu.vn</td>
                        <td style="text-align: center;" th:text="${#temporals.format(mgr.createdAt, 'dd-MM-yyyy', 'Asia/Ho_Chi_Minh')}">01-07-2026</td>
                        <td style="text-align: center;">
                            <span th:if="${mgr.isActive}" class="badge badge-success">Active</span>
                            <span th:unless="${mgr.isActive}" class="badge badge-danger">Locked</span>
                        </td>
                        <td style="text-align: center;">
                            <div style="display: flex; gap: 8px; justify-content: center;">
                                <!-- Nút xem chi tiết -->
                                <a th:href="@{/admin/managers/{id}(id=${mgr.id})}" class="btn btn-secondary btn-sm">Detail</a>

                                <!-- Form Lock/Unlock tài khoản -->
                                <form th:action="@{/admin/managers/{id}/status(id=${mgr.id})}" method="post" style="display: inline;">
                                    <button type="submit"
                                            th:class="${mgr.isActive} ? 'btn btn-danger btn-sm' : 'btn btn-success btn-sm'"
                                            th:text="${mgr.isActive} ? 'Lock' : 'Unlock'">
                                        Lock
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <!-- Trường hợp danh sách trống -->
                    <tr th:if="${#lists.isEmpty(managers)}">
                        <td colspan="6" style="text-align: center; color: #64748b; padding: 30px;">
                            Chưa có quản lý tòa nhà nào được tạo trong hệ thống.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
