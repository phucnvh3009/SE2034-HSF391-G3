<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{admin/layout :: layout('Chi tiết thông tin Dorm Manager', 'informationManager.css', ~{::content})}">
    <div th:fragment="content">

        <!-- Nút quay lại danh sách -->
        <div style="margin-bottom: 20px;">
            <a th:href="@{/admin/managers}" class="btn btn-secondary">Quay lại danh sách</a>
        </div>
        <div class="profile-wrapper">
            <!-- CỘT TRÁI: THẺ HỒ SƠ TỔNG QUAN -->
            <div class="profile-card">
                <div class="profile-avatar-container">
                    <span th:if="${manager.avatar == null}">👤</span>
                    <img th:if="${manager.avatar != null}" th:src="${manager.avatar}" alt="Avatar" />
                </div>

                <div class="profile-name" th:text="${manager.fullName}">Nguyễn Văn A</div>
                <div class="profile-role">Dormitory Manager</div>

                <div class="profile-status">
                    <span th:if="${manager.isActive}" class="badge badge-success">Tài khoản Active</span>
                    <span th:unless="${manager.isActive}" class="badge badge-danger">Tài khoản Locked</span>
                </div>
                <!-- Form thay đổi trạng thái tài khoản -->
                <form th:action="@{/admin/managers/{id}/status(id=${manager.id})}" method="post">
                    <!-- Truyền tham số để controller biết redirect lại trang detail này -->
                    <input type="hidden" name="redirectDetail" value="true" />
                    <button type="submit"
                            th:class="${manager.isActive} ? 'btn btn-danger' : 'btn btn-success'"
                            style="width: 100%;"
                            th:text="${manager.isActive} ? 'Khóa tài khoản' : 'Mở khóa tài khoản'">
                        Khóa tài khoản
                    </button>
                </form>
            </div>
            <!-- CỘT PHẢI: CHI TIẾT THÔNG TIN -->
            <div class="profile-content">
                <!-- 1. Thông tin cá nhân -->
                <div class="card-title" style="margin-top: 0;">Thông tin cá nhân</div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <span class="detail-label">Gmail đăng nhập</span>
                        <span class="detail-value" th:text="${manager.email}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Số điện thoại liên hệ</span>
                        <span class="detail-value" th:text="${manager.phone}">Chưa có thông tin số điẹn thoại</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Giới tính</span>
                        <span class="detail-value" th:text="${manager.gender == T(vn.edu.fpt.model.constant.GenderType).MALE ? 'Nam' : 'Nữ'}">Chưa có thông tin</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Ngày-tháng-năm sinh</span>
                        <span class="detail-value" th:text="${#temporals.format(manager.getDob(), 'dd-MM-yyyy', 'Asia/Ho_Chi_Minh')}">Chưa có thông tin</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Ngày tạo tài khoản</span>
                        <span class="detail-value" th:text="${#temporals.format(manager.createdAt, 'dd-MM-yyyy HH:mm', 'Asia/Ho_Chi_Minh')}">Chưa có thông tin</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
