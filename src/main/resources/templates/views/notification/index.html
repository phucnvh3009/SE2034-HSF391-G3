<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông Báo - Ký Túc Xá</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f3f4f6; }

        /* Layout Container */
        .container { display: flex; min-height: 100vh; }

        /* Sidebar Style */
        .sidebar {
            width: 260px;
            background: #1f2937;
            color: #fff;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .sidebar-logo {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 5px;
            padding-left: 10px;
        }
        .user-info {
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
            color: #38bdf8;
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }
        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #d1d5db;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar-menu a:hover {
            background: #374151;
            color: #fff;
        }
        .sidebar-menu a.active {
            background: #3b82f6;
            color: #fff;
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        h1 { margin-top: 0; margin-bottom: 4px; }
        .subtitle { color: #666; margin-top: 0; margin-bottom: 20px; }

        /* Thanh lọc */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-bar a {
            padding: 6px 16px;
            border: 1px solid #ccc;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            background: #fff;
        }
        .filter-bar a.active { background: #333; color: #fff; border-color: #333; }
        .badge {
            display: inline-block;
            background: red; color: white;
            border-radius: 50%; padding: 1px 6px;
            font-size: 11px; margin-left: 4px;
        }

        /* Danh sách thông báo */
        .notification-list { display: flex; flex-direction: column; gap: 10px; }
        .notification-item {
            background: #fff;
            border: 1px solid #ddd;
            border-left: 4px solid transparent;
            border-radius: 8px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        .notification-item.unread { border-left-color: #1976d2; }
        .notification-body { flex: 1; }
        .notification-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .notification-content { color: #555; font-size: 14px; }
        .notification-meta { text-align: right; white-space: nowrap; }
        
        .type-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid #ccc;
            margin-bottom: 6px;
        }
        .type-payment      { border-color: #1976d2; color: #1976d2; }
        .type-announcement { border-color: #9c27b0; color: #9c27b0; }
        .type-maintenance  { border-color: #ff9800; color: #ff9800; }
        .type-system       { border-color: #607d8b; color: #607d8b; }

        .time-ago { font-size: 12px; color: #999; display: block; }
        .unread-dot { color: #1976d2; font-size: 18px; }
        .empty-state { text-align: center; color: #999; padding: 60px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Sidebar di chuyển -->
    <div class="sidebar">
        <div class="sidebar-logo">DORM Student</div>
        <div class="user-info">
            Xin chào, <strong th:text="${userDisplayName}">Sinh viên</strong>
        </div>
        <ul class="sidebar-menu">
            <li><a th:href="@{/student/dashboard}">📊 Dashboard</a></li>
            <li><a th:href="@{/notifications}" class="active">🔔 Thông báo</a></li>
            <li><a th:href="@{/student/reports}">🛠️ Báo cáo sự cố</a></li>
            <li style="margin-top: auto; padding-top: 20px; border-top: 1px solid #374151;">
                <a th:href="@{/logout}" style="color: #f87171;"><span class="icon">🚪</span> Đăng xuất</a>
            </li>
        </ul>
    </div>

    <!-- Vùng nội dung chính -->
    <div class="content">
        <h1>Thông Báo</h1>
        <p class="subtitle">Tất cả thông báo của bạn</p>



        <!-- Danh sách thông báo -->
        <div class="notification-list">
            <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
                Không có thông báo nào.
            </div>

            <div th:each="n : ${notifications}"
                 class="notification-item"
                 th:classappend="${!n.read} ? ' unread' : ''">

                <div class="notification-body">
                    <div class="notification-title" th:text="${n.title}"></div>
                    <div class="notification-content" th:text="${n.content}"></div>
                </div>

                <div class="notification-meta">
                    <span class="type-badge"
                          th:classappend="'type-' + ${n.type}"
                          th:text="${
                              n.type == 'payment'      ? 'Thanh toán' :
                              n.type == 'announcement' ? 'Thông báo'  :
                              n.type == 'maintenance'  ? 'Bảo trì'    :
                                                         'Hệ thống'
                          }"></span>
                    <span class="time-ago" th:text="${n.timeAgo}"></span>
                    <span th:if="${!n.read}" class="unread-dot">●</span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
