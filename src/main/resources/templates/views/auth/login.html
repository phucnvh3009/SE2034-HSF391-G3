<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống KTX - SDMS</title>
    <link rel="stylesheet" th:href="@{/auth/css/login.css}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>HỆ THỐNG KÝ TÚC XÁ</h2>
            <p>Dormitory Management System (SDMS)</p>
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            Đăng xuất tài khoản thành công!
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">
            Sai thông tin đăng nhập!
        </div>

        <form th:action="@{/login}" th:object="${loginRequest}" method="post">

            <div class="form-group">
                <label for="email">Gmail Đăng Nhập</label>
                <input type="email" id="email" th:field="*{email}" placeholder="example@fpt.edu.vn" required/>
                <span class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="password">Mật Khẩu</label>
                <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required/>
                <span class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
        </form>
    </div>
</div>
</body>
</html>
