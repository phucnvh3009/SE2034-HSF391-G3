<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{views/dom_manager/layout :: layout('Chi tiết nhân viên (Staff View)', ~{::content})}">
    <div th:fragment="content">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Hồ sơ nhân viên (Staff Profile)</h2>
            <a th:href="@{/dom_manager/staff_account}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm text-center">
                    <div class="card-body py-5">
                        <div class="mb-3">
                            <i class="bi bi-person-circle text-secondary" style="font-size: 5rem;" th:if="${staff.avatar == null}"></i>
                            <img th:if="${staff.avatar != null}" th:src="${staff.avatar}" class="rounded-circle" style="width: 120px; height: 120px; object-fit: cover;">
                        </div>
                        <h4 class="card-title fw-bold" th:text="${staff.fullName}">Nguyễn Văn A</h4>
                        <p class="text-muted">Dormitory Staff</p>
                        
                        <div class="mb-4">
                            <span th:if="${staff.isActive}" class="badge bg-success px-3 py-2 fs-6">Đang hoạt động (Active)</span>
                            <span th:unless="${staff.isActive}" class="badge bg-danger px-3 py-2 fs-6">Đã khóa (Locked)</span>
                        </div>

                        <form th:action="@{/dom_manager/staff_account/{id}/status(id=${staff.id})}" method="post">
                            <button type="submit" th:class="${staff.isActive} ? 'btn btn-danger w-100' : 'btn btn-success w-100'">
                                <i th:class="${staff.isActive} ? 'bi bi-lock' : 'bi bi-unlock'"></i> 
                                <span th:text="${staff.isActive} ? 'Khóa tài khoản này' : 'Mở khóa tài khoản này'"></span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Thông tin cá nhân</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3 border-bottom pb-2">
                            <div class="col-sm-4 text-muted fw-bold">Email đăng nhập</div>
                            <div class="col-sm-8" th:text="${staff.email}">staff@email.com</div>
                        </div>
                        <div class="row mb-3 border-bottom pb-2">
                            <div class="col-sm-4 text-muted fw-bold">Số điện thoại liên hệ</div>
                            <div class="col-sm-8" th:text="${staff.phone}">0123456789</div>
                        </div>
                        <div class="row mb-3 border-bottom pb-2">
                            <div class="col-sm-4 text-muted fw-bold">Giới tính</div>
                            <div class="col-sm-8" th:text="${staff.gender == T(vn.edu.fpt.model.constant.GenderType).MALE ? 'Nam' : (staff.gender == T(vn.edu.fpt.model.constant.GenderType).FEMALE ? 'Nữ' : 'Khác')}">Nam</div>
                        </div>
                        <div class="row mb-3 border-bottom pb-2">
                            <div class="col-sm-4 text-muted fw-bold">Ngày tháng năm sinh</div>
                            <div class="col-sm-8" th:text="${#temporals.format(staff.dob, 'dd-MM-yyyy')}">01-01-2000</div>
                        </div>
                        <div class="row mb-3 pb-2">
                            <div class="col-sm-4 text-muted fw-bold">Ngày tạo tài khoản</div>
                            <div class="col-sm-8" th:text="${#temporals.format(staff.createdAt, 'dd-MM-yyyy HH:mm', 'Asia/Ho_Chi_Minh')}">01-01-2026 10:00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
