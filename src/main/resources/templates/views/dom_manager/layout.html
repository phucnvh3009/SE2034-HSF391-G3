<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)" lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${title}">Dormitory Management</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <style>
            body {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                margin: 0;
                padding: 0;
                background-color: #f8f9fa;
            }

            .wrapper {
                display: flex;
                flex: 1;
                width: 100%;
            }

            .sidebar {
                width: 250px;
                flex-shrink: 0;
                background-color: #343a40;
                color: white;
                min-height: 100vh;
            }

            .sidebar a {
                color: #cfd8dc;
                text-decoration: none;
                padding: 15px 20px;
                display: block;
                border-bottom: 1px solid #454d55;
            }

            .sidebar a:hover, .sidebar a.active {
                background-color: #495057;
                color: white;
            }

            .main-content {
                flex: 1;
                padding: 20px;
                width: 100%;
                overflow-x: auto;
            }

            .navbar {
                background-color: #007bff;
            }

            .navbar-brand, .nav-link {
                color: white !important;
            }
        </style>
    </head>
    <body>
        <div class="wrapper w-100 m-0 p-0">
            <div th:replace="~{views/dom_manager/fragments/sidebar :: sidebar}"></div>
            <div class="d-flex flex-column flex-grow-1" style="min-width: 0;">
                <div th:replace="~{views/dom_manager/fragments/header :: header}"></div>
                <main class="main-content w-100">
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:replace="${content}"></div>
                </main>
                <div th:replace="~{views/dom_manager/fragments/footer :: footer}"></div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
