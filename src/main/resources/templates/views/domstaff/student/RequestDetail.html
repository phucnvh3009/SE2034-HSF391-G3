<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dormitory Staff - Chi tiết Yêu cầu</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/domstaff/css/domstaff.css}">
</head>
<body>
<!-- Sidebar -->
<th:block th:replace="~{/domstaff/Share/sidebar::sidebar}"></th:block>

<!-- Main Content -->
<div class="main-content">
    <!-- Top Header -->
    <th:block th:replace="~{/domstaff/Share/header::header}"></th:block>

    <!-- Page Content -->
    <div class="content-wrapper">
        <h3 class="mb-4 text-dark"><a th:href="@{/domstaff/reports}" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i></a> Chi tiết Yêu cầu</h3>

        <div class="card mx-auto" style="max-width: 800px;">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold" th:text="'Yêu cầu #REQ-' + ${report.id}">Yêu cầu #REQ-1002</h6>
                <span class="badge bg-warning text-dark border">Đang chờ duyệt</span>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-sm-6">
                        <div class="info-label">Người gửi</div>
                        <div class="info-value" th:text="${report.studentName + ' (' + report.studentCode + ')'}">Nguyễn Văn A (SE150123)</div>
                    </div>
                    <div class="col-sm-6">
                        <div class="info-label">Ngày gửi</div>
                        <div class="info-value" th:text="${report.createdAt}">20/07/2026 14:30</div>
                    </div>
                </div>
                <div class="info-label mt-2">Loại yêu cầu</div>
                <div class="info-value">Xin chuyển phòng</div>
                
                <div class="info-label mt-2">Nội dung chi tiết</div>
                <div class="p-3 bg-light border rounded-1 mb-4" style="min-height: 100px;">
                    Em có xích mích nhỏ với bạn cùng phòng nên xin phép ban quản lý cho em chuyển sang tòa B phòng trống ạ. Em cảm ơn.
                </div>

                <hr>

                <h6 class="fw-bold mb-3">Phản hồi của Ban quản lý</h6>
                <form th:action="@{/domstaff/requests/detail/{id}(id=${report.id})}" method="POST">
                    <div class="mb-3">
        <textarea name="staffNote" class="form-control" rows="4"
                  placeholder="Nhập nội dung phản hồi cho sinh viên..."
                  th:text="${report.staffNote}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cập nhật trạng thái:</label>
                        <select name="status" class="form-select w-auto">
                            <option value="PENDING" th:selected="${report.reportStatus == 'PENDING'}">Đang chờ duyệt</option>
                            <option value="IN_PROGRESS" th:selected="${report.reportStatus == 'IN_PROGRESS'}">Đang xử lý</option>
                            <option value="RESOLVED" th:selected="${report.reportStatus == 'RESOLVED'}">Đã giải quyết</option>
                            <option value="REJECTED" th:selected="${report.reportStatus == 'REJECTED'}">Từ Chối</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i> Gửi phản hồi & Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
