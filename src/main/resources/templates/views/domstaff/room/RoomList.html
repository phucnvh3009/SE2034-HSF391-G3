<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dormitory Staff - Quản lý Phòng</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/domstaff/css/domstaff.css}">
</head>
<body>

<!-- Sidebar -->
<th:block th:replace="~{views/domstaff/share/sidebar::sidebar}"></th:block>

<!-- Main Content -->
<div class="main-content">
    
    <!-- Top Header -->
    <th:block th:replace="~{views/domstaff/share/header::header}"></th:block>
    <!-- Page Content -->
    <div class="content-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0 text-dark">Danh sách Phòng</h3>

        </div>

        <!-- Toolbar: Search & Filter -->
        <form th:action="@{/domstaff/rooms}" method="GET" class="d-flex gap-2 mb-4">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control w-25" placeholder="Nhập mã phòng...">
            <select name="status" class="form-select w-25">
                <option value="">-- Tất cả trạng thái --</option>
                <option value="AVAILABLE" th:selected="${selectedStatus != null and selectedStatus.name() == 'AVAILABLE'}">Còn trống</option>
                <option value="FULL" th:selected="${selectedStatus != null and selectedStatus.name() == 'FULL'}">Đã đầy</option>
                <option value="MAINTENANCE" th:selected="${selectedStatus != null and selectedStatus.name() == 'MAINTENANCE'}">Bảo trì</option>
            </select>
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Lọc</button>
            <a th:href="@{/domstaff/rooms}" class="btn btn-outline-secondary">Xóa lọc</a>
        </form>
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Tòa Nhà</th>
                                <th class="ps-4">Tấng</th>
                                <th>Số Phòng</th>
                                <th>Loại Phòng</th>
                                <th>Sức chứa</th>
                                <th>Trạng thái</th>
                                <th class="text-center pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loop qua danh sách Room (truyền từ Controller) -->
                            <tr th:each="room : ${rooms}">
                                <td class="ps-4 fw-medium text-dark" th:text="${room.buildingName}" >Tòa A</td>
                                <td class="ps-4 fw-medium text-dark" th:text="${room.floor}">Tầng 1</td>
                                
                                <td>
                                    <span class="fw-bold text-primary" th:text="${room.roomNumber}">101</span>
                                </td>
                                
                                <td>
                                    <span th:text="${room.typeName}">Phòng 4 người</span>
                                </td>
                                
                                <td>
                                    <span th:text="${room.currentOccupancy + ' / ' + room.maxBeds}">2 / 4</span>
                                </td>
                                
                                <td>
                                    <span th:if="${room.status == 'AVAILABLE'}" class="badge bg-success bg-opacity-10 text-success status-badge border border-success border-opacity-25">
                                        Còn trống
                                    </span>
                                    <span th:if="${room.status == 'FULL' }" class="badge bg-danger bg-opacity-10 text-danger status-badge border border-danger border-opacity-25">
                                        Đã đầy
                                    </span>
                                    <span th:if="${room.status == 'MAINTENANCE'}" class="badge bg-warning bg-opacity-10 text-warning status-badge border border-warning border-opacity-25">
                                        Bảo trì
                                    </span>
                                </td>
                                
                                <!-- Thao tác -->
                                <td class="text-center pe-4">
                                    <a th:href="@{/domstaff/rooms/detail/{id}(id=${room.id})}" class="btn btn-sm btn-outline-primary" title="Xem chi tiết" data-bs-toggle="tooltip"><i class="bi bi-eye"></i></a>

                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(rooms)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    Không tìm thấy phòng nào.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Phân trang -->
            <div class="card-footer bg-white border-top-0 py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-muted small">Hiển thị dữ liệu trang 1</span>
                    <nav th:if="${totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/domstaff/rooms(keyword=${keyword}, status=${selectedStatus}, page=${currentPage - 1})}">Trang trước</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i ? 'active' : ''}">
                                <a class="page-link" th:href="@{/domstaff/rooms(keyword=${keyword}, status=${selectedStatus}, page=${i})}" th:text="${i}">1</a>
                            </li>

                            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/domstaff/rooms(keyword=${keyword}, status=${selectedStatus}, page=${currentPage + 1})}">Trang sau</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>
</body>
</html>
