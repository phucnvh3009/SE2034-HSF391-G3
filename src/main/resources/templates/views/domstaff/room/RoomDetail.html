<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dormitory Staff - Chi tiết Phòng</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/domstaff/css/domstaff.css}">
</head>
<body>
<!-- Minimal Sidebar structure -->
<!-- Sidebar -->
<th:block th:replace="~{/domstaff/Share/sidebar::sidebar}"></th:block>
<!-- Main Content -->
<div class="main-content">
    <!-- Top Header -->
    <th:block th:replace="~{/domstaff/Share/header::header}"></th:block>

    <!-- Page Content -->
    <div class="content-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0 text-dark"><a href="/domstaff/rooms" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i></a> Chi tiết Phòng: <span class="text-primary" th:text="${roomDetail.roomNumber}">A101</span></h3>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header bg-white py-3 fw-bold">Thông tin chung</div>
                    <div class="card-body">
                        <div class="info-label">Tòa nhà</div>
                        <div class="info-value" th:text="${roomDetail.buildingName}">Tòa A</div>
                        <div class="info-label">Tầng</div>
                        <div class="info-value" th:text="${roomDetail.floor}">Tầng 1</div>
                        <div class="info-label">Loại phòng</div>
                        <div class="info-value" th:text="${roomDetail.typeName}">Phòng 4 người</div>
                        <div class="info-label">Trạng thái</div>
                        <div class="info-value">
                            <span class="badge border" 
                                  th:classappend="${roomDetail.status == 'MAINTENANCE' ? 'bg-warning bg-opacity-10 text-warning border-warning border-opacity-25' : (roomDetail.occupancyStatus.contains('Đã đầy') ? 'bg-danger bg-opacity-10 text-danger border-danger border-opacity-25' : 'bg-success bg-opacity-10 text-success border-success border-opacity-25')}"
                                  th:text="${roomDetail.occupancyStatus}">Còn trống (2/4)</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-white py-3 fw-bold d-flex justify-content-between align-items-center">
                        <span>Danh sách cư dân hiện tại</span>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-3">Giường</th>
                                    <th>Tên sinh viên</th>
                                    <th>Mã SV</th>
                                    <th>Trạng thái Hợp đồng</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="bed : ${roomDetail.beds}">
                                    <td class="ps-3 fw-bold" th:classappend="${!bed.isOccupied ? 'text-muted' : ''}" th:text="${bed.bedName}">Giường 1</td>
                                    
                                    <th:block th:if="${bed.isOccupied}">
                                        <td th:text="${bed.studentName}">Nguyễn Văn A</td>
                                        <td th:text="${bed.studentCode}">SE150001</td>
                                        <td><span class="badge bg-success" th:text="${bed.contractStatus}">Đang hiệu lực</span></td>
                                    </th:block>
                                    
                                    <th:block th:if="${!bed.isOccupied}">
                                        <td colspan="3" class="text-muted fst-italic">Trống</td>
                                    </th:block>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
