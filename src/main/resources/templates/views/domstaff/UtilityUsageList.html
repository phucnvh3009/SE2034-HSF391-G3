<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dormitory Staff - Ghi nhân Sử dụng Dịch vụ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/domstaff/css/domstaff.css}">
</head>
<body>
<!-- Sidebar -->
<th:block th:replace="~{views/domstaff/share/sidebar::sidebar}"></th:block>

<!-- Main Content -->
<div class="main-content">
    <!-- Top Header -->
    <th:block th:replace="~{views/domstaff/share/header::header}"></th:block>


    <!-- Page Content -->
    <div class="content-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0 text-dark">Lịch sử Chỉ số Điện / Nước</h3>
            <a th:href="@{/domstaff/utility-usage/create}" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Ghi nhận tháng mới
            </a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 text-center">
                    <thead>
                        <tr>
                            <th class="text-start ps-4">Phòng</th>
                            <th>Tháng / Năm</th>
                            <th>Chỉ số Điện đầu</th>
                            <th>Chỉ số Điện cuối</th>
                            <th>Chỉ số Nước đầu</th>
                            <th>Chỉ số Nước cuối</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="usage : ${usages}">
                            <td class="text-start ps-4 fw-bold text-primary" th:text="${usage.roomNumber}">A101</td>
                            <td th:text="${usage.monthYear}">Tháng 06/2026</td>
                            <td th:text="${usage.startElectricity}">1200</td>
                            <td>
                                <span th:text="${usage.endElectricity}">1350</span>
                                <span th:class="${usage.electricityUsage >= 0 ? 'badge bg-warning text-dark' : 'badge bg-danger'}" 
                                      th:text="${usage.electricityUsage > 0 ? '+' + usage.electricityUsage : usage.electricityUsage}">+150</span>
                            </td>
                            <td th:text="${usage.startWater}">450</td>
                            <td>
                                <span th:text="${usage.endWater}">480</span>
                                <span th:class="${usage.waterUsage >= 0 ? 'badge bg-info' : 'badge bg-danger'}" 
                                      th:text="${usage.waterUsage > 0 ? '+' + usage.waterUsage : usage.waterUsage}">+30</span>
                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>
</html>
